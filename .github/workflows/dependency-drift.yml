name: Dependency Drift Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dependency-drift:
    name: Check for dependency drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for lockfile drift
        run: |
          git diff --exit-code pnpm-lock.yaml || (echo "pnpm-lock.yaml is out of sync. Run pnpm install and commit the lockfile." && exit 1)

      - name: Audit dependencies
        run: pnpm audit --audit-level moderate
